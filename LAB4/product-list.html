<div class="product-grid">
  @for (product of products; track product.id) {
    <div class="product-card">
      <img [src]="getMainImage(product)" [alt]="product.name">

      <div class="thumbnails">
        @for (img of product.images; track img) {
          <img
            [src]="img"
            [alt]="product.name"
            (click)="selectImage(product, img)"
            [class.active]="getMainImage(product) === img"
          >
        }
      </div>
      <h3>{{ product.name }}</h3>
      <p>{{ product.description}}</p>
      <p class="rating">⭐ {{ product.rating }}</p>
      <p class="price">{{ product.price }}</p>
      <a [href]="product.link" target="_blank">Open on Kaspi.kz</a>
      <button (click)="share(product)">Share on Telegram</button>
    </div>
  }
</div>
